spring:
  datasource:
    url: jdbc:postgresql://postgres-service:5432/contentcurator
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update

aws:
  region: us-east-1
  endpoint-override: http://non-existent:4566
  access-key: test
  secret-key: test
  sqs:
    user-activity-queue-url: http://non-existent:4566/000000000000/user-activity
    content-ingested-queue-url: http://non-existent:4566/000000000000/content-ingested
    digest-scheduled-queue-url: http://non-existent:4566/000000000000/digest-scheduled

ml:
  service:
    url: ${ML_SERVICE_URL:http://ml-service:5001}

# Disable SQS polling in OpenShift
sqs:
  polling:
    enabled: false
