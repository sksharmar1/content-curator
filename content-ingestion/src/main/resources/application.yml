server:
  port: 8082
spring:
  application:
    name: content-ingestion-service
  datasource:
    url: jdbc:postgresql://localhost:5433/contentcurator
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
aws:
  region: us-east-1
  endpoint-override: http://localhost:4566
  access-key: test
  secret-key: test
  sqs:
    content-ingested-queue-url: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/content-ingested
    user-activity-queue-url: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/user-activity
ingestion:
  poll-interval-ms: 1800000

management:
  endpoints:
    web:
      exposure:
        include: health,info
