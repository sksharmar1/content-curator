spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/contentcurator
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
aws:
  region: ${AWS_REGION:us-east-1}
  endpoint-override: http://localstack:4566
  access-key: ${AWS_ACCESS_KEY:test}
  secret-key: ${AWS_SECRET_KEY:test}
  sqs:
    content-ingested-queue-url: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/content-ingested
    user-activity-queue-url: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/user-activity
