services:
  postgres:
    image: postgres:16-alpine
    container_name: cc-postgres
    environment:
      POSTGRES_DB: contentcurator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - cc-postgres-data:/var/lib/postgresql/data
      - ../db/V1__initial_schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.3
    container_name: cc-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,s3,lambda
      - DEFAULT_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - cc-localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_localstack/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  cc-postgres-data:
  cc-localstack-data:
