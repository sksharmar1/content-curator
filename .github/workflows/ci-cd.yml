name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/content-curator

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
      - name: Build and test
        run: mvn clean verify -DskipTests
        working-directory: .

  test-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ml-service
      - name: Run ML service smoke test
        run: |
          python main.py &
          sleep 3
          curl -f http://localhost:5001/health
        working-directory: ml-service

  build-and-push:
    needs: [test-backend, test-ml]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Maven packages
        run: mvn clean package -DskipTests

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push user-profile
        uses: docker/build-push-action@v5
        with:
          context: ./user-profile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/user-profile:latest

      - name: Build and push content-ingestion
        uses: docker/build-push-action@v5
        with:
          context: ./content-ingestion
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/content-ingestion:latest

      - name: Build and push recommendation
        uses: docker/build-push-action@v5
        with:
          context: ./recommendation
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/recommendation:latest

      - name: Build and push analytics
        uses: docker/build-push-action@v5
        with:
          context: ./analytics
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/analytics:latest

      - name: Build and push ml-service
        uses: docker/build-push-action@v5
        with:
          context: ./ml-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ml-service:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest

  deploy-openshift:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenShift CLI
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-client-linux.tar.gz
          tar -xzf openshift-client-linux.tar.gz
          sudo mv oc /usr/local/bin/

      - name: Deploy to OpenShift
        env:
          OPENSHIFT_SERVER: ${{ secrets.OPENSHIFT_SERVER }}
          OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
        run: |
          oc login $OPENSHIFT_SERVER --token=$OPENSHIFT_TOKEN --insecure-skip-tls-verify
          oc apply -f openshift/namespace.yml
          oc apply -f openshift/configmap.yml
          oc apply -f openshift/secret.yml
          oc apply -f openshift/postgres.yml
          oc apply -f openshift/ml-service.yml
          oc apply -f openshift/user-profile.yml
          oc apply -f openshift/frontend.yml
          oc rollout restart deployment/user-profile -n content-curator
          oc rollout restart deployment/ml-service -n content-curator
          oc rollout restart deployment/frontend -n content-curator
