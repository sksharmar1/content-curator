apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-profile
  namespace: content-curator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-profile
  template:
    metadata:
      labels:
        app: user-profile
    spec:
      containers:
        - name: user-profile
          image: content-curator/user-profile:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cc-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cc-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cc-secrets
                  key: JWT_SECRET
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: cc-config
                  key: AWS_REGION
            - name: AWS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cc-secrets
                  key: AWS_ACCESS_KEY
            - name: AWS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: cc-secrets
                  key: AWS_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: user-profile-service
  namespace: content-curator
spec:
  selector:
    app: user-profile
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: user-profile-route
  namespace: content-curator
spec:
  to:
    kind: Service
    name: user-profile-service
  port:
    targetPort: 8081
  tls:
    termination: edge
